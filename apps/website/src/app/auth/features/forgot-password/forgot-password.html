<div class="flex flex-auto items-center justify-center p-4 sm:p-12">
  <mat-card class="flex w-full max-w-sm flex-col p-8 sm:p-12">
    <button
      type="button"
      class="mb-4 inline-flex items-center cursor-pointer text-primary-700 dark:text-primary-500 self-start text-sm font-medium underline-offset-4 hover:underline"
      (click)="goBack()"
    >
      <mat-icon class="mr-1 size-4" svgIcon="arrow-left"></mat-icon>
      <span>Retour</span>
    </button>

    <div class="text-4xl leading-tight font-extrabold tracking-tight">Mot de passe oublié</div>
    <div class="mt-0.5 font-medium">Remplissez le formulaire pour réinitialiser votre mot de passe.</div>

    <form class="mt-8" (submit)="forgotPassword($event)">
      <div class="flex flex-col gap-y-4">
        <mat-form-field class="w-full">
          <mat-label>Adresse e-mail</mat-label>
          <input id="email" matInput [formField]="forgotPasswordForm.email" />
        </mat-form-field>
      </div>

      @if (authStore.error(); as errorMessage) {
      <div class="mt-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ errorMessage }}</div>
      }

      <button
        type="submit"
        matButton="filled"
        class="mt-6 w-full"
        [disabled]="forgotPasswordForm().invalid() || authStore.isLoading()"
      >
        {{ authStore.isLoading() ? 'Envoi en cours...' : 'Envoyer le lien' }}
      </button>
    </form>
  </mat-card>
</div>
