<div
  class="flex h-full w-full flex-auto flex-col items-center justify-center bg-white px-4 text-neutral-950 dark:bg-neutral-950 dark:text-white"
>
  <div class="text-base">Accueil du site</div>

  @if (authStore.user(); as user) {
  <div class="mt-3 text-center">
    <div class="font-medium">{{ user.name }}</div>
    <div class="text-sm text-neutral-500 dark:text-neutral-400">{{ user.email }}</div>
  </div>

  @if (authStore.error(); as error) {
  <div class="mt-3 text-sm text-red-600 dark:text-red-400">{{ error }}</div>
  } } @if (authStore.user()) {
  <div class="mt-4 flex items-center gap-3">
    <a matButton="outlined" routerLink="/auth/profile"> Profil </a>

    <button
      matButton="filled"
      class="bg-red-600 text-white hover:bg-red-700 disabled:bg-red-300 disabled:text-white dark:bg-red-500 dark:hover:bg-red-600 dark:disabled:bg-red-900/60"
      type="button"
      [disabled]="authStore.isLoading()"
      (click)="signOut()"
    >
      {{ authStore.isLoading() ? 'Déconnexion en cours...' : 'Se déconnecter' }}
    </button>
  </div>
  } @else {
  <a matButton="outlined" class="mt-4" routerLink="/auth/sign-in"> Se connecter </a>
  }
</div>
