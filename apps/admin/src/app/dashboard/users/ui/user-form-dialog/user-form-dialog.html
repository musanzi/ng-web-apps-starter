<h2 mat-dialog-title>{{ isEdit() ? "Modifier l'utilisateur" : 'Créer un utilisateur' }}</h2>

<form (submit)="save($event)">
  <mat-dialog-content class="grid min-w-80 gap-4 sm:min-w-120">
    <mat-form-field>
      <mat-label>Nom</mat-label>
      <input matInput [formField]="userForm.name" autocomplete="name" cdkFocusInitial />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Email</mat-label>
      <input matInput type="email" [formField]="userForm.email" autocomplete="email" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Mot de passe</mat-label>
      <input matInput type="password" [formField]="userForm.password" autocomplete="new-password" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Rôles</mat-label>
      <mat-select [formField]="userForm.roles" multiple>
        @for (role of data.roles; track role.id) {
        <mat-option [value]="role.id">{{ role.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button matButton="outlined" type="button" [mat-dialog-close]="undefined">Annuler</button>
    <button matButton="filled" type="submit" [disabled]="userForm().invalid()">
      <mat-icon svgIcon="save" />
      {{ isEdit() ? 'Enregistrer' : 'Créer' }}
    </button>
  </mat-dialog-actions>
</form>
