<div
  class="container mx-auto flex w-full flex-auto flex-col items-start gap-5 px-4 py-8 text-neutral-950 sm:px-6 lg:py-12 dark:text-white"
>
  <div class="w-full max-w-2xl">
    <div class="text-2xl font-semibold tracking-tight sm:text-3xl">Paramètres du profil</div>
    <div class="mt-2 text-sm text-neutral-500 dark:text-neutral-400">
      Gérez les informations de votre compte et votre mot de passe.
    </div>
  </div>
  <nav mat-tab-nav-bar [mat-stretch-tabs]="false" [tabPanel]="tabPanel">
    @for (link of links; track link.id) {
    <a mat-tab-link routerLinkActive [routerLink]="link.route" [active]="rla.isActive" #rla="routerLinkActive">
      {{ link.label }}
    </a>
    }
  </nav>
  <mat-form-field class="w-full max-w-2xl sm:hidden">
    <mat-select [value]="router.url" (selectionChange)="router.navigateByUrl($event.value)" #select>
      @for (link of links; track link.id) {
      <mat-option [value]="link.route">{{ link.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  <mat-tab-nav-panel
    class="w-full max-w-2xl rounded border border-neutral-200 bg-white p-5 shadow-sm dark:border-neutral-800 dark:bg-neutral-900 sm:p-8"
    #tabPanel
  >
    <router-outlet />
  </mat-tab-nav-panel>
</div>
