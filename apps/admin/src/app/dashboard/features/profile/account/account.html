<form class="grid grid-cols-1 gap-5" (submit)="save($event)">
  <div class="col-span-full">
    <div class="text-lg font-semibold">Informations du compte</div>
    <div class="mt-1 text-sm text-neutral-500 dark:text-neutral-400">
      Mettez à jour le nom et l'adresse e-mail associés à votre compte.
    </div>
  </div>

  <mat-form-field class="w-full">
    <mat-label>Nom</mat-label>
    <input matInput [formField]="accountForm.name" />
    <mat-icon svgIcon="user" matPrefix></mat-icon>
  </mat-form-field>

  <mat-form-field class="w-full">
    <mat-label>Adresse e-mail</mat-label>
    <input matInput type="email" [formField]="accountForm.email" />
    <mat-icon svgIcon="mail" matPrefix></mat-icon>
  </mat-form-field>

  @if (authStore.success(); as message) {
  <div
    class="col-span-full rounded border border-green-200 bg-green-50 px-3 py-2 text-sm text-green-700 dark:border-green-900/70 dark:bg-green-950/40 dark:text-green-300"
  >
    {{ message }}
  </div>
  } @if (authStore.error(); as error) {
  <div
    class="col-span-full rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700 dark:border-red-900/70 dark:bg-red-950/40 dark:text-red-300"
  >
    {{ error }}
  </div>
  }

  <mat-divider class="col-span-full my-2" />

  <div class="col-span-full flex justify-end">
    <button matButton="filled" [disabled]="accountForm().invalid() || authStore.isLoading()">
      {{ authStore.isLoading() ? 'Enregistrement...' : 'Enregistrer' }}
    </button>
  </div>
</form>
